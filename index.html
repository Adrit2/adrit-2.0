<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CalcuLove - Age Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Poppins", sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left,#24104a,#06010f 60%);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    /* Stars */
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(white 1px, transparent 1px);
      background-size:60px 60px;
      opacity:0.3;
      pointer-events:none;
    }

    .container{
      width:100%;
      max-width:900px;
      padding:20px;
      position:relative;
      z-index:1;
    }

    .title{
      text-align:center;
      margin-bottom:30px;
    }

    .title h1{
      font-size:64px;
      color:#ff7ba7;
      font-weight:700;
    }

    .title p{
      color:#aaa;
      margin-top:8px;
      letter-spacing:1px;
    }

    .tabs{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }

    .tab{
      padding:14px 28px;
      border-radius:999px;
      background:#140b25;
      border:1px solid rgba(255,255,255,0.08);
      color:#c9b7ff;
      cursor:pointer;
      transition:0.3s;
    }

    .tab.active{
      background:linear-gradient(90deg,#7a5cff,#ff9d6c);
      color:white;
      box-shadow:0 0 25px rgba(255,160,122,0.35);
    }

    .card{
      background:rgba(17, 10, 32, 0.92);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:40px;
      backdrop-filter:blur(12px);
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    .card h2{
      font-size:38px;
      margin-bottom:10px;
      color:#f7d27a;
    }

    .card p{
      color:#9e95b8;
      margin-bottom:35px;
    }

    .input-group{
      margin-bottom:25px;
    }

    .input-group label{
      display:block;
      margin-bottom:12px;
      color:#b9addd;
      letter-spacing:1px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:#24153f;
      color:white;
      font-size:18px;
      outline:none;
      border:1px solid rgba(255,255,255,0.05);
    }

    input:focus{
      border-color:#ffb870;
      box-shadow:0 0 15px rgba(255,184,112,0.25);
    }

    button{
      width:100%;
      padding:20px;
      border:none;
      border-radius:18px;
      font-size:20px;
      font-weight:600;
      cursor:pointer;
      background:linear-gradient(90deg,#ffd36b,#ffb870);
      color:#2c1600;
      transition:0.3s;
      margin-top:10px;
      box-shadow:0 0 20px rgba(255,200,100,0.35);
    }

    button:hover{
      transform:translateY(-2px);
    }

    .result{
      margin-top:30px;
      padding:25px;
      border-radius:18px;
      background:#1d1234;
      display:none;
      text-align:center;
    }

    .result h3{
      color:#ffda8f;
      margin-bottom:12px;
      font-size:28px;
    }

    .result p{
      margin:0;
      color:#ddd;
      font-size:20px;
    }

    footer{
      text-align:center;
      margin-top:30px;
      color:#746c8e;
      font-size:14px;
    }

    @media(max-width:768px){
      .title h1{
        font-size:42px;
      }

      .card{
        padding:25px;
      }

      .card h2{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      <h1>CalcuLove</h1>
      <p>Age • Love • Life's little calculations</p>
    </div>

    <div class="tabs">
      <div class="tab active">🎂 Age Calculator</div>
      <div class="tab">💖 Love Calculator</div>
      <div class="tab">🧮 Calculator</div>
    </div>

    <div class="card">

      <h2>🎂 Age Calculator</h2>
      <p>Find out exactly how old you are — down to the day</p>

      <div class="input-group">
        <label>YOUR DATE OF BIRTH</label>
        <input type="date" id="dob">
      </div>

      <div class="input-group">
        <label>CALCULATE AGE AS OF</label>
        <input type="date" id="today">
      </div>

      <button onclick="calculateAge()">
        ✨ Calculate My Age
      </button>

      <div class="result" id="resultBox">
        <h3>Your Age</h3>
        <p id="resultText"></p>
      </div>

    </div>

    <footer>
      CalcuLove • Made with 💛 for every curious heart
    </footer>

  </div>

  <script>
    function calculateAge(){

      const dob = document.getElementById("dob").value;
      const today = document.getElementById("today").value;

      if(!dob || !today){
        alert("Please select both dates");
        return;
      }

      const birthDate = new Date(dob);
      const currentDate = new Date(today);

      let years = currentDate.getFullYear() - birthDate.getFullYear();
      let months = currentDate.getMonth() - birthDate.getMonth();
      let days = currentDate.getDate() - birthDate.getDate();

      if(days < 0){
        months--;
        days += 30;
      }

      if(months < 0){
        years--;
        months += 12;
      }

      document.getElementById("resultBox").style.display = "block";

      document.getElementById("resultText").innerHTML =
        `${years} Years, ${months} Months, ${days} Days`;
    }
  </script>

</body>
</html>
